<!DOCTYPE html>
<html>
<head>
  <title>Room Rent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin:0; background:#f2f2f2;}
    header { background:#008080; color:white; padding:15px; text-align:center;}
    .container { padding:10px;}
    .room {
      background:white; margin:10px 0; padding:10px;
      border-radius:10px;
    }
    img { width:100%; border-radius:10px;}
    .price { color:green; font-weight:bold;}
    button {
      background:#008080; color:white;
      border:none; padding:10px; width:100%;
      border-radius:5px;
    }
  </style>
</head>

<body>

<header>🏠 Room Rent Finder</header>

<div class="container">

  <div class="room">
    <img src="https://via.placeholder.com/300">
    <h3>1 BHK Room</h3>
    <p class="price">₹5000</p>
    <p>Location: Delhi</p>
    <button>Contact</button>
  </div>

</div>

</body>
</html>
